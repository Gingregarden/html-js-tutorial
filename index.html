<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>マイGUIアプリ</title>
        <style>
            /*ハイパーリンク風のボタン*/
            .clickable-link {
                color: #0066cc;
                text-decoration: underline;
                cursor: pointer;
                margin: 0 5px;
            }
            .clickable-link:hover {
                color: #ff0000;
            }

            /*表*/
            table { margin-top: 10px; border-collapse: collapse; }
            th, td { padding: 8px; border: 1px solid #ccc; }

            /* グラフの外枠 */
            .chart-container {
                display: flex;
                align-items: center;
                width: 200px; /* グラフの最大幅 */
                height: 20px;
                background-color: #f0f0f0; /* 背景（グリッド代わり） */
                border-radius: 2px;
            }
            /* 棒本体 */
            .bar {
                height: 100%;
                background-color: #ff6b6b; /* 画像に近い赤色 */
                transition: width 0.5s;    /* 伸びるアニメーション（おまけ） */
            }
            /* 数値ラベル */
            .bar-value {
                margin-left: 8px;
                font-size: 12px;
                color: #666;
            }
        </style>
    </head>
    <body>
        <h1>ネストJSON読み込みアプリ</h1>
        
        <!--ファイル読み込み-->
        <input type="file" id="fileInput" accept=".json" multiple>
        <div id="fileContent">ここにファイル情報を表示します</div>

        <!--ファイル選択ボタン-->
        <div id="buttonContainer"></div>

        <!--表のひな形-->
        <div id="level1-area"></div>
        <hr>
        <div id="level2-area"></div>
        <hr>
        <div id="level3-area"></div>

        <script>
            const fileInput = document.getElementById('fileInput');
            const display = document.getElementById('fileContent');
            // 読み込んだデータを保存する場所 { ファイル名: データ }
            const dataStore = {};
            const areas = [
                document.getElementById('level1-area'),
                document.getElementById('level2-area'),
                document.getElementById('level3-area')
            ]

            fileInput.addEventListener('change', (event) => {
                const files = event.target.files;
                const buttonContainer = document.getElementById('buttonContainer');
                // ボタンをリセット
                buttonContainer.innerHTML = "";

                Array.from(files).forEach(file => {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        const jsonData = JSON.parse(e.target.result);
                        dataStore[file.name] = jsonData; // データを保存

                        // ファイルごとの切り替えボタンを作成
                        const btn = document.createElement('button');
                        btn.textContent = file.name;
                        // ファイルを選んだら、まず「会社概要」の表示関数を呼ぶ
                        btn.onclick = () => displayCompanyInfo(jsonData); 
                        buttonContainer.appendChild(btn);

                        display.textContent = file.name + " を読み込みました";
                    };
                    reader.readAsText(file);
                });
            });

            /**
             * エリアを初期化してタイトルとテーブルを準備する
             * @param {int} levelIndex - 表示先のエリアのインデックス
             * @param {string} title - 表示する見出し
             * @returns {HTMLTableElement} 作成したテーブルオブジェクト
             */
            function prepareArea(levelIndex, title) {
                // 下位エリアをクリア
                for (let i = levelIndex + 1; i < areas.length; i++) {
                    areas[i].innerHTML = "";
                }

                // 自分のエリアを準備
                const area = areas[levelIndex];
                area.innerHTML = `<h2>${title}</h2>`;
                const table = document.createElement('table');
                area.appendChild(table);
                return table;
            }

            /**
             * テーブルに「ラベル：値」の行を追加する
             * @param {HTMLTableElement} table - 対象のテーブル
             * @param {string} label - 左側の項目名
             * @param {string|HTMLElement} value - 右側の値（文字列またはリンク要素）
             */
            function addInfoRow(table, label, value) {
                const row = table.insertRow();
                row.insertCell().textContent = label;
                const valueCell = row.insertCell();

                // 値が文字列なら textContent、要素（リンクなど）なら appendChild
                if (value instanceof HTMLElement) {
                    valueCell.appendChild(value);
                } else {
                    valueCell.textContent = value;
                }
            }

            // レベル1: 会社概要を表示
            function displayCompanyInfo(company) {
                
                // テーブルを取得
                const table = prepareArea(0, "会社概要");
                
                // 資本金の行
                addInfoRow(table, "資本金", company.capital_yen.toLocaleString() + "円");

                // 地域の行
                const rowReg = table.insertRow();
                rowReg.insertCell().textContent = "地域";
                const regCell = rowReg.insertCell();

                // 地域の配列をループして「リンク風ボタン」を作成
                company.regions.forEach(region => {
                    const span = document.createElement('span');
                    span.textContent = region.name;
                    span.className = "clickable-link";
                    
                    // クリック時に「この地域のオブジェクト」を渡してレベル2を呼ぶ
                    span.onclick = () => displayRegionDetails(region);
                    
                    regCell.appendChild(span);
                });
            }

            // レベル2: 地域詳細
            function displayRegionDetails(region) {
                // テーブルを取得
                const table = prepareArea(1, "地域詳細" + region.name);

                // 地域名の行
                addInfoRow(table, "地域名", region.name);

                // 従業員の行
                const rowEmp = table.insertRow();
                rowEmp.insertCell().textContent = "従業員";
                const empCell = rowEmp.insertCell();
                const ul = document.createElement('ul');

                // 従業員名を箇条書きにする
                region.employees.forEach(emp => {
                    const li = document.createElement('li');
                    const span = document.createElement('span');
                    span.textContent = emp.name;
                    span.className = "clickable-link";
                    span.onclick = () => displayEmployeeDetails(emp)

                    li.appendChild(span);
                    ul.appendChild(li);

                    empCell.appendChild(ul);
                })
            }

            // レベル3: 従業員詳細
            function displayEmployeeDetails(emp) {
                // テーブルを取得
                const table = prepareArea(2, "従業員詳細" + emp.name)

                // 氏名の行
                addInfoRow(table, "氏名", emp.name);

                // グラフの作成
                const container = document.createElement('div');
                container.className = 'chart-container';

                // バーの作成
                const bar = document.createElement('div');
                bar.className = 'bar';
                // 年齢を100点満点に見立てて幅を計算
                bar.style.width = emp.age + '%';

                // 
                const valueLabel = document.createElement('span');
                valueLabel.className = 'bar-value';
                valueLabel.textContent = emp.age;
                
                container.append(bar);
                container.appendChild(valueLabel);

                // グラフを一行として追加
                addInfoRow(table, "年齢(グラフ)", container)

                // 画像のように「年度ごとの得点」を一覧で見せたい場合は、display系の関数の中で forEachを使ってこのグラフ行を量産する だけです。
                // 最大値の計算: グラフの幅を正しく出すために、データの中の最大値（例：1000点）を100%として計算すると、画像のような相対的な長さが再現できます。
                // 色の使い分け: 棒の色をクラスで変えれば、特定の条件（合格点以上なら青、未満なら赤など）で色分けも可能です。
            }

            // セルに入れるグラフのHTML構造例
            // <div class="chart-container">
            //   <div class="bar" style="width: 85%;"></div> <span class="bar-value">850</span>
            // </div>

        </script>

    </body>
</html>
